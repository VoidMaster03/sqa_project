# ============================================================
#  GitHub Actions — CI/CD Pipeline
#  Aplikasi  : Mahasiswa Baru USTI
#  File PHP  : mahasiswa_baru_usti2.php
#  Prodi     : Teknik Informatika · Fakultas Teknik dan Informatika · USTI
#  TA        : 2026
# ============================================================

name: CI/CD Mahasiswa Baru USTI

# ── TRIGGER ─────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

# ── GLOBAL ENV ──────────────────────────────────────────────
env:
  PHP_VERSION: "8.2"
  APP_FILE: mahasiswa_baru_usti2.php

# ============================================================
#  JOBS
# ============================================================
jobs:

  # ----------------------------------------------------------
  # JOB 1 — LINT & SYNTAX CHECK
  # Memastikan tidak ada syntax error pada file PHP
  # ----------------------------------------------------------
  lint:
    name: "🔍 PHP Lint & Syntax Check"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: php-cs-fixer

      - name: Check PHP syntax (php -l)
        run: php -l ${{ env.APP_FILE }}

      - name: Check PHP coding style (php-cs-fixer dry-run)
        run: |
          php-cs-fixer fix ${{ env.APP_FILE }} \
            --dry-run \
            --diff \
            --rules=@PSR12 \
            --allow-risky=yes || true

  # ----------------------------------------------------------
  # JOB 2 — UNIT TEST
  # Menjalankan pengujian logika validasi form:
  #   ✔ POST dengan nama valid  → $saved = true
  #   ✔ POST dengan nama kosong → $error_nama muncul
  # ----------------------------------------------------------
  test:
    name: "🧪 Unit Test — Validasi Form"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: phpunit

      - name: Install Composer dependencies (jika ada)
        run: |
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist
          else
            echo "Tidak ada composer.json — lewati."
          fi

      # Buat test script inline agar tidak butuh file test terpisah
      - name: Buat file test sementara (MahasiswaTest.php)
        run: |
          cat > MahasiswaTest.php << 'EOF'
          <?php
          /**
           * Unit Test — mahasiswa_baru_usti2.php
           * Menguji logika validasi tanpa framework (plain PHP assertions).
           */

          echo "====================================\n";
          echo "  Unit Test: Mahasiswa Baru USTI\n";
          echo "====================================\n\n";

          $pass = 0;
          $fail = 0;

          /**
           * Fungsi bantu: simulasi logika PHP dari mahasiswa_baru_usti2.php
           */
          function proses_form(string $nama_input): array
          {
              $nama       = trim($nama_input);
              $saved      = false;
              $error_nama = '';
              $timestamp  = '';

              if ($nama === '') {
                  $error_nama = 'Nama calon mahasiswa wajib diisi.';
              } else {
                  $saved     = true;
                  $timestamp = date('d-m-Y H:i:s');
              }

              return compact('nama', 'saved', 'error_nama', 'timestamp');
          }

          // ── TEST 1 ───────────────────────────────────────────
          // POST dengan nama valid → saved = true, error kosong
          $result = proses_form('Budi Santoso');
          $label  = 'TC-01: Nama valid → saved = true';
          if ($result['saved'] === true && $result['error_nama'] === '') {
              echo "  [PASS] $label\n";
              $pass++;
          } else {
              echo "  [FAIL] $label\n";
              $fail++;
          }

          // ── TEST 2 ───────────────────────────────────────────
          // POST dengan nama kosong → error muncul, saved = false
          $result = proses_form('');
          $label  = 'TC-02: Nama kosong → error_nama muncul';
          if ($result['saved'] === false && $result['error_nama'] !== '') {
              echo "  [PASS] $label\n";
              $pass++;
          } else {
              echo "  [FAIL] $label\n";
              $fail++;
          }

          // ── TEST 3 ───────────────────────────────────────────
          // POST dengan nama hanya spasi → dianggap kosong setelah trim()
          $result = proses_form('   ');
          $label  = 'TC-03: Nama hanya spasi → error_nama muncul';
          if ($result['saved'] === false && $result['error_nama'] !== '') {
              echo "  [PASS] $label\n";
              $pass++;
          } else {
              echo "  [FAIL] $label\n";
              $fail++;
          }

          // ── TEST 4 ───────────────────────────────────────────
          // Timestamp harus terisi saat saved = true
          $result = proses_form('Siti Rahayu');
          $label  = 'TC-04: Timestamp terisi saat nama valid';
          if ($result['saved'] === true && $result['timestamp'] !== '') {
              echo "  [PASS] $label\n";
              $pass++;
          } else {
              echo "  [FAIL] $label\n";
              $fail++;
          }

          // ── TEST 5 ───────────────────────────────────────────
          // XSS prevention: htmlspecialchars harus encode karakter berbahaya
          $xss_input = '<script>alert("xss")</script>';
          $encoded   = htmlspecialchars($xss_input);
          $label     = 'TC-05: htmlspecialchars encode karakter XSS';
          if (strpos($encoded, '<script>') === false) {
              echo "  [PASS] $label\n";
              $pass++;
          } else {
              echo "  [FAIL] $label\n";
              $fail++;
          }

          // ── HASIL ────────────────────────────────────────────
          echo "\n------------------------------------\n";
          echo "  Total PASS : $pass\n";
          echo "  Total FAIL : $fail\n";
          echo "------------------------------------\n";

          if ($fail > 0) {
              exit(1); // Buat CI gagal jika ada test yang tidak lolos
          }
          EOF

      - name: Jalankan Unit Test
        run: php MahasiswaTest.php

      - name: Hapus file test sementara
        if: always()
        run: rm -f MahasiswaTest.php

  # ----------------------------------------------------------
  # JOB 3 — SECURITY SCAN
  # Memeriksa potensi kerentanan dasar pada kode PHP
  # ----------------------------------------------------------
  security:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install PHPMD (PHP Mess Detector)
        run: composer global require phpmd/phpmd --quiet

      - name: Jalankan PHPMD
        run: |
          ~/.composer/vendor/bin/phpmd ${{ env.APP_FILE }} text \
            cleancode,codesize,controversial,design,naming,unusedcode \
            || true

      - name: Cek penggunaan htmlspecialchars (XSS guard)
        run: |
          echo "Memeriksa htmlspecialchars pada output variabel..."
          grep -n 'htmlspecialchars' ${{ env.APP_FILE }} && \
            echo "✔ htmlspecialchars ditemukan — output aman." || \
            echo "⚠ PERINGATAN: Tidak ada htmlspecialchars! Periksa keamanan output."

  # ----------------------------------------------------------
  # JOB 4 — DEPLOY (hanya saat push ke branch main)
  # Deploy file ke server via SSH (SCP)
  # Konfigurasi secrets di: Settings → Secrets → Actions
  # ----------------------------------------------------------
  deploy:
    name: "🚀 Deploy ke Server"
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SCP ke server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SERVER_HOST }}      # IP / domain server
          username: ${{ secrets.SERVER_USER }}      # username SSH
          key:      ${{ secrets.SERVER_SSH_KEY }}   # private key SSH
          port:     ${{ secrets.SERVER_PORT || 22 }}
          source:   ${{ env.APP_FILE }}
          target:   ${{ secrets.SERVER_TARGET_DIR }} # mis: /var/www/html/usti/

      - name: Verifikasi deploy (opsional ping HTTP)
        run: |
          sleep 3
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            "${{ secrets.APP_URL }}/${{ env.APP_FILE }}" || echo "000")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✔ Deploy berhasil — aplikasi merespons 200 OK."
          else
            echo "⚠ Periksa server — status HTTP: $STATUS"
          fi

  # ----------------------------------------------------------
  # JOB 5 — NOTIFIKASI RINGKASAN
  # Menampilkan ringkasan status pipeline di GitHub Actions
  # ----------------------------------------------------------
  summary:
    name: "📋 Ringkasan Pipeline"
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: always()

    steps:
      - name: Tampilkan ringkasan
        run: |
          echo "================================================"
          echo "  CI/CD Pipeline — Mahasiswa Baru USTI"
          echo "  Branch   : ${{ github.ref_name }}"
          echo "  Commit   : ${{ github.sha }}"
          echo "  Triggered: ${{ github.event_name }}"
          echo "================================================"
          echo "  Lint     : ${{ needs.lint.result }}"
          echo "  Test     : ${{ needs.test.result }}"
          echo "  Security : ${{ needs.security.result }}"
          echo "================================================"
